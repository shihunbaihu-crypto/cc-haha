name: 一键搬运Release
on:
  workflow_dispatch:

jobs:
  copy_job:
    runs-on: ubuntu-latest
    steps:
      - name: 搬运工开始工作
        uses: wangchucheng/gh-release-copy@v1
        with:
          src_repo: "NanmiCoder/cc-haha"
          # 指定只搬运这个版本
          tag: "v0.1.1"
          target_repo: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
