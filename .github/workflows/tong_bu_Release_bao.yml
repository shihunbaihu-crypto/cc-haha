name: 一键搬运Release

on:
  workflow_dispatch:

jobs:
  copy_job:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 搬运工开始工作（v0.1.1）
        run: |
          echo "开始从 NanmiCoder/cc-haha 搬运 v0.1.1 Release..."

          # 下载 assets（目前原仓库 v0.1.1 没有 assets，没关系）
          gh release download v0.1.1 --repo NanmiCoder/cc-haha --dir ./assets || true

          # 获取源 Release 的标题和详细说明
          TITLE=$(gh release view v0.1.1 --repo NanmiCoder/cc-haha --json name --jq '.name' 2>/dev/null || echo "Claude Code Haha v0.1.1")
          BODY=$(gh release view v0.1.1 --repo NanmiCoder/cc-haha --json body --jq '.body' 2>/dev/null || echo "从 NanmiCoder/cc-haha 搬运而来")

          # 先尝试更新已存在的 Release，如果不存在再创建
          echo "正在创建或更新 Release v0.1.1..."
          if gh release view v0.1.1 --repo ${{ github.repository }} >/dev/null 2>&1; then
            echo "Release 已存在，正在更新..."
            gh release edit v0.1.1 \
              --title "$TITLE" \
              --notes "$BODY" \
              --repo ${{ github.repository }}
          else
            echo "Release 不存在，正在创建..."
            gh release create v0.1.1 \
              --title "$TITLE" \
              --notes "$BODY" \
              --repo ${{ github.repository }} \
              ./assets/*
          fi

          echo "搬运完成！请刷新 Releases 页面查看。"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
